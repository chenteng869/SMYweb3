version: '3.8'

# ============================================================
# SMYweb3 AI 自动化解决方案 — 预发布(Staging)环境
# 基于 docker-compose.prod.yml 调整:
#   - 使用 GHCR 预构建镜像 (非本地build)
#   - 降低资源限制 (适合测试服务器)
#   - 开启 DEBUG 日志
#   - 暴露更多端口用于调试
# 用法: docker compose -f docker-compose.staging.yml up -d
# ============================================================

services:

  # ===== 1. PostgreSQL 16 =====
  postgres:
    image: postgres:16-alpine
    container_name: smyweb3-postgres-staging
    restart: unless-stopped
    environment:
      POSTGRES_USER: smyweb3
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smyweb3_staging_2026}
      POSTGRES_DB: smyweb3_main
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smyweb3 -d smyweb3_main"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    networks:
      - smyweb3-staging-net

  # ===== 2. Redis 7 =====
  redis:
    image: redis:7-alpine
    container_name: smyweb3-redis-staging
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-smyweb3_redis_staging}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_staging_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-smyweb3_redis_staging}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    networks:
      - smyweb3-staging-net

  # ===== 3. RabbitMQ =====
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: smyweb3-rabbitmq-staging
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-smyweb3}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-smyweb3_mq_staging}
    ports:
      - "127.0.0.1:5673:5672"
      - "127.0.0.1:15673:15672"
    volumes:
      - rabbitmq_staging_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "running"]
      interval: 15s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    networks:
      - smyweb3-staging-net

  # ===== 4. MinIO =====
  minio:
    image: minio/minio:latest
    container_name: smyweb3-minio-staging
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-smyweb3_minio_staging}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-smyweb3_minio_secret_staging}
    ports:
      - "127.0.0.1:9001:9000"
      - "127.0.0.1:9002:9001"
    volumes:
      - minio_staging_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    networks:
      - smyweb3-staging-net

  # ===== 5. NestJS API (Staging) =====
  api:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-smyweb3}/smyweb3-api:staging-latest
    container_name: smyweb3-api-staging
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: staging
      LOG_LEVEL: debug
      DATABASE_URL: postgresql://smyweb3:${DB_PASSWORD:-smyweb3_staging_2026}@postgres:5432/smyweb3_main
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-smyweb3_redis_staging}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-smyweb3}:${RABBITMQ_PASSWORD:-smyweb3_mq_staging}@rabbitmq:5672
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-smyweb3_minio_staging}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-smyweb3_minio_secret_staging}
      N8N_URL: http://n8n:5678
      JWT_SECRET: ${JWT_SECRET:-staging_jwt_secret_change_me}
      CORS_ORIGIN: "*"
      PORT: 3001
      METRICS_ENABLED: "true"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - smyweb3-staging-net

  # ===== 6. Admin Web (Staging) =====
  admin-web:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-smyweb3}/smyweb3-admin:staging-latest
    container_name: smyweb3-admin-staging
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - smyweb3-staging-net

volumes:
  postgres_staging_data:
  redis_staging_data:
  rabbitmq_staging_data:
  minio_staging_data:

networks:
  smyweb3-staging-net:
    driver: bridge
