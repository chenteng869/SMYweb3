version: '3.8'

# ============================================================
# SMYweb3 AI 自动化解决方案 — 生产环境 Docker Compose
# 包含资源限制、健康检查、日志驱动、安全加固
# 用法: docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:

  # ===== 1. PostgreSQL 16 (生产配置) =====
  postgres:
    image: postgres:16-alpine
    container_name: smyweb3-postgres
    restart: always
    environment:
      POSTGRES_USER: smyweb3
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: smyweb3_main
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smyweb3 -d smyweb3_main"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - smyweb3-net

  # ===== 2. Redis 7 (生产配置 + 持久化) =====
  redis:
    image: redis:7-alpine
    container_name: smyweb3-redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-backlog 511
      --maxclients 10000
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - smyweb3-net

  # ===== 3. RabbitMQ (生产配置) =====
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: smyweb3-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK: 0.8
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "running"]
      interval: 20s
      timeout: 15s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - smyweb3-net

  # ===== 4. MinIO (生产配置) =====
  minio:
    image: minio/minio:latest
    container_name: smyweb3-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 20s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - smyweb3-net

  # ===== 5. n8n (生产配置) =====
  n8n:
    image: n8nio/n8n:latest
    container_name: smyweb3-n8n
    restart: always
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n.smyweb3.com/
      GENERIC_TIMEZONE: Asia/Shanghai
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: smyweb3_n8n
      DB_POSTGRESDB_USER: smyweb3
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD}
      NODE_FUNCTION_ALLOW_BUILTIN: *
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "5"
    networks:
      - smyweb3-net

  # ===== 6. Prometheus (生产配置) =====
  prometheus:
    image: prom/prometheus:latest
    container_name: smyweb3-prometheus
    restart: always
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - smyweb3-net

  # ===== 7. Grafana (生产配置) =====
  grafana:
    image: grafana/grafana:latest
    container_name: smyweb3-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://grafana.smyweb3.com/
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - smyweb3-net

  # ===== 8. NestJS API (生产配置) =====
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    container_name: smyweb3-api
    restart: always
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://smyweb3:${DB_PASSWORD}@postgres:5432/smyweb3_main
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      N8N_URL: http://n8n:5678
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        replicas: 1
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "10"
    networks:
      - smyweb3-net

  # ===== 9. Admin Web (Nginx, 生产配置) =====
  admin-web:
    build:
      context: ./apps/admin-web
      dockerfile: Dockerfile
    container_name: smyweb3-admin
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - smyweb3-net

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  n8n_data:
  prometheus_data:
  grafana_data:

networks:
  smyweb3-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
