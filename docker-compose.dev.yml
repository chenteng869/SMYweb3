version: '3.8'

# ============================================================
# SMYweb3 AI 自动化解决方案 — 开发环境 Docker Compose
# 包含全部 10 个服务，用于本地开发与集成测试
# 用法: docker compose -f docker-compose.dev.yml up -d
# ============================================================

services:

  # ===== 1. PostgreSQL 16 数据库 =====
  postgres:
    image: postgres:16-alpine
    container_name: smyweb3-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: smyweb3
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smyweb3_dev_2026}
      POSTGRES_DB: smyweb3_main
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smyweb3"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - smyweb3-net

  # ===== 2. Redis 7 缓存 + Pub/Sub =====
  redis:
    image: redis:7-alpine
    container_name: smyweb3-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-smyweb3_redis_dev}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-smyweb3_redis_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smyweb3-net

  # ===== 3. RabbitMQ 3 消息队列 (Agent 任务队列) =====
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: smyweb3-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-smyweb3}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-smyweb3_mq_dev_2026}
    ports:
      - "5672:5672"       # AMQP 协议端口
      - "15672:15672"     # 管理界面 UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "running"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - smyweb3-net

  # ===== 4. MinIO 对象存储 (文件/文档/证据) =====
  minio:
    image: minio/minio:latest
    container_name: smyweb3-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-smyweb3_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-smyweb3_minio_secret_dev_2026}
    ports:
      - "9000:9000"       # API 端口
      - "9001:9001"       # 控制台 UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - smyweb3-net

  # ===== 5. n8n 工作流自动化平台 =====
  n8n:
    image: n8nio/n8n:latest
    container_name: smyweb3-n8n
    restart: unless-stopped
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin@smyweb3.com}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-smyweb3_n8n_dev_2026}
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: Asia/Shanghai
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: smyweb3_n8n
      DB_POSTGRESDB_USER: smyweb3
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD:-smyweb3_dev_2026}
      NODE_FUNCTION_ALLOW_BUILTIN: *
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smyweb3-net

  # ===== 6. Prometheus 监控数据采集 =====
  prometheus:
    image: prom/prometheus:latest
    container_name: smyweb3-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - smyweb3-net

  # ===== 7. Grafana 可视化监控面板 =====
  grafana:
    image: grafana/grafana:latest
    container_name: smyweb3-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-smyweb3_grafana_dev_2026}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - smyweb3-net

  # ===== 8. NestJS API 后端 =====
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: smyweb3-api
    restart: unless-stopped
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://smyweb3:${DB_PASSWORD:-smyweb3_dev_2026}@postgres:5432/smyweb3_main
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-smyweb3_redis_dev}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-smyweb3}:${RABBITMQ_PASSWORD:-smyweb3_mq_dev_2026}@rabbitmq:5672
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-smyweb3_minio_admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-smyweb3_minio_secret_dev_2026}
      N8N_URL: http://n8n:5678
      JWT_SECRET: ${JWT_SECRET:-smyweb3_jwt_dev_secret_key_2026}
      CORS_ORIGIN: http://localhost:5173,http://localhost:8080
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - smyweb3-net

  # ===== 9. Admin Web 前端 (Nginx) =====
  admin-web:
    build:
      context: ./apps/admin-web
      dockerfile: Dockerfile
    container_name: smyweb3-admin
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - smyweb3-net

  # ===== 10. MinIO 初始化 Bucket (一次性) =====
  minio-init:
    image: minio/mc:latest
    container_name: smyweb3-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY:-smyweb3_minio_admin} ${MINIO_SECRET_KEY:-smyweb3_minio_secret_dev_2026};
      mc mb --ignore-existing myminio/smyweb3-files;
      mc mb --ignore-existing myminio/smyweb3-documents;
      mc mb --ignore-existing myminio/smyweb3-evidence;
      mc anonymous set download myminio/smyweb3-files;
      echo 'MinIO buckets initialized';
      "

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  n8n_data:
  prometheus_data:
  grafana_data:

networks:
  smyweb3-net:
    driver: bridge
