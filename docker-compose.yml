version: '3.8'

services:
  # ===== PostgreSQL 数据库 =====
  postgres:
    image: postgres:16-alpine
    container_name: smyweb3-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: smyweb3
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
      POSTGRES_DB: smyweb3_main
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smyweb3"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Redis 缓存 =====
  redis:
    image: redis:7-alpine
    container_name: smyweb3-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_in_production}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ===== NestJS API =====
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: smyweb3-api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://smyweb3:${DB_PASSWORD:-changeme_in_production}@postgres:5432/smyweb3_main
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme_in_production}
      JWT_SECRET: ${JWT_SECRET:-changeme_in_production}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://admin.yourdomain.com}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - smyweb3-net

  # ===== Admin Web Frontend =====
  admin-web:
    build:
      context: ./apps/admin-web
      dockerfile: Dockerfile
    container_name: smyweb3-admin
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - smyweb3-net

volumes:
  postgres_data:
  redis_data:

networks:
  smyweb3-net:
    driver: bridge
