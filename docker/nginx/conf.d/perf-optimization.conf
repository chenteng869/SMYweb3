# =================================================================
# SMYWeb3 Nginx 性能优化配置
# 文件位置: docker/nginx/conf.d/perf-optimization.conf
# 引用方式: 在 nginx.conf 的 http 块中 include 此文件
# 适用场景: 生产环境 API 网关 + Admin 前端 + WebSocket 服务
# =================================================================

# ================================================================
# 一、Gzip 压缩优化
# 目的: 减少传输数据量，提升前端首屏加载速度
# 预期效果: JS/CSS/JSON 资源体积减少 60%~80%
# ================================================================

gzip on;                          # 开启 Gzip 压缩
gzip_vary on;                     # 在响应头添加 Vary: Accept-Encoding，支持 CDN 缓存
gzip_proxied any;                 # 对所有代理请求都启用压缩（含 CDN 回源）
gzip_comp_level 6;                # 压缩级别 1~9，6 是 CPU/压缩率的最佳平衡点
gzip_min_length 256;              # 小于 256 字节的资源不压缩（压缩开销 > 收益）

# 支持压缩的 MIME 类型列表 — 覆盖前端和 API 所有常见资源格式
gzip_types
    application/atom+xml          # RSS/Atom 订阅源
    application/geo+json          # 地理位置数据 (地图模块)
    application/javascript        # JavaScript 文件
    application/x-javascript      # 兼容旧版 MIME 类型
    application/json              # API JSON 响应体
    application/ld+json           # 结构化数据 (SEO)
    application/manifest+json     # PWA manifest
    application/rdf+xml           # RDF 数据
    application/rss+xml           # RSS 订阅
    application/xhtml+xml         # XHTML 页面
    application/xml               # XML 数据接口
    font/eot                      # EOT 字体文件
    font/otf                      # OTF 字体文件
    font/ttf                      # TTF 字体文件
    image/svg+xml                 # SVG 图标/矢量图
    text/css                      # 样式表
    text/javascript               # JS 文件（text 类型）
    text/plain                    # 纯文本
    text/xml;                     # XML 文本


# ================================================================
# 二、静态资源浏览器缓存策略（Admin Web 前端）
# 目的: 利用浏览器缓存减少重复请求，降低服务器负载
# 策略: 带 hash 的静态资源设置长期缓存（30 天）+ immutable 标记
# 注意: 构建工具（Vite/Webpack）必须对输出文件名做 content-hash
# ================================================================

location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 30d;                                          # 浏览器缓存有效期 30 天
    add_header Cache-Control "public, immutable";         # public=可被 CDN/代理缓存, immutable=不发送条件请求
    access_log off;                                       # 静态资源请求不写访问日志，减少磁盘 I/O
}


# ================================================================
# 三、API 速率限制增强（基于令牌桶算法）
# 目的: 防止恶意请求、爬虫攻击、突发流量打垮后端
# 说明:
#   zone=名称:大小   — 共享内存区域，10m ≈ 支持 16 万个 IP 状态
#   rate=Nr/s       — 每秒允许请求数（平均速率），突发允许瞬时 burst
# ================================================================

# API 通用限制: 每秒 100 请求（覆盖大部分正常业务流量）
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;

# 认证接口限制: 每秒 20 请求（防暴力破解登录/注册/验证码）
limit_req_zone $binary_remote_addr zone=auth:10m rate=20r/s;

# Webhook 接收限制: 每秒 60 请求（第三方平台回调入口）
limit_req_zone $binary_remote_addr zone=webhook:10m rate=60r/s;


# ================================================================
# 四、后端代理超时优化
# 目的: 合理设置与 NestJS 后端的连接/读写超时，避免长请求阻塞 worker
# ================================================================

proxy_connect_timeout 10s;     # 与后端建立 TCP 连接的最大等待时间
proxy_send_timeout 30s;       # 向后端发送请求体的最大时间
proxy_read_timeout 60s;       # 等待后端响应的最大时间（含 LLM 流式调用场景）


# ================================================================
# 五、WebSocket 长连接优化
# 目的: 支持 Agent 实时状态推送、获客看板实时刷新等 WS 场景
# 关键: HTTP/1.1 升级协议头，保持长连接不断开
# ================================================================

proxy_http_version 1.1;                       # 使用 HTTP/1.1（WebSocket 要求）
proxy_set_header Upgrade $http_upgrade;        # 告知后端需要协议升级
proxy_set_header Connection "upgrade";         # 建立 WebSocket 隧道


# ================================================================
# 六、请求 Buffer 优化
# 目的: 调整 Nginx 与后端之间的缓冲区大小，适配大文件上传和 API 响应
# 业务背景: 存证文件上传、批量数据导入、LLM 长文本输出
# ================================================================

client_max_body_size 50m;          # 单次请求最大 body 大小（文件上传场景）
proxy_buffer_size 32k;             # 代理缓冲区初始大小（用于响应头）
proxy_buffers 8 32k;              # 8 个 32k 缓冲区 = 256k 总缓冲能力
proxy_busy_buffer_size 64k;       # 忙时仍可写入的最大缓冲区


# ================================================================
# 七、访问日志过滤优化（减少磁盘 I/O 写入）
# 目的: 过滤掉高频低价值的日志记录（健康检查、静态资源、指标采集）
# 预期效果: 日志量减少约 40%~60%，延长 SSD 寿命
# ================================================================

# 定义日志可写性映射表：匹配到的 URI 不写日志
map $request_uri $loggable {
    default                                         1;   # 默认记录所有请求
    ~^/health                                     0;   # K8s/Docker 健康检查探针
    ~^/metrics                                    0;   # Prometheus 指标采集端点
    ~*\.(js|css|png|jpg|ico|svg|woff2?)$        0;   # 已设缓存的静态资源
}

# 应用过滤后的日志规则（需配合主配置中的 log_format combined 使用）
access_log /var/log/nginx/access.log combined if=$loggable;
